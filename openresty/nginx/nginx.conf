worker_processes auto;

env JWT_SECRET_KEY;
env S3_BUCKET_NAME;
env ORIGIN;

error_log logs/error.log error;

events {
    worker_connections 1024;
}
http {
    resolver 127.0.0.11 valid=30s;    
    lua_shared_dict jwt_cache 10m;
    sendfile on;
    default_type application/octet-stream;

    server {
        listen 80;
        server_name spotihack.ru;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            resolver 127.0.0.11 valid=30s;
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name spotihack.ru;

        resolver 127.0.0.11 valid=30s;

        ssl_certificate /etc/letsencrypt/live/spotihack.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/spotihack.ru/privkey.pem;

        set $bucket_name '';
        set $origin '';
        set_by_lua $bucket_name 'return os.getenv("S3_BUCKET_NAME")';
        set_by_lua $origin 'return os.getenv("ORIGIN")';

        location /api {
            set $upstream http://spotihack:3000;
            proxy_pass $upstream;
        }
    
        location / {
            set $upstream http://frontend:3001;
            proxy_pass $upstream;
        }

        
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 443 ssl;
        server_name ws.spotihack.ru;

        ssl_certificate /etc/letsencrypt/live/spotihack.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/spotihack.ru/privkey.pem;

        set $bucket_name '';
        set $origin '';
        set_by_lua $bucket_name 'return os.getenv("S3_BUCKET_NAME")';
        set_by_lua $origin 'return os.getenv("ORIGIN")';

        location / {
            proxy_pass http://spotihack:3000;
            proxy_buffering off;
            proxy_cache off;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400;
            proxy_set_header Cookie $http_cookie;
        }
    }

    server {
        listen 443 ssl;
        server_name storage.spotihack.ru;

        ssl_certificate /etc/letsencrypt/live/spotihack.ru/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/spotihack.ru/privkey.pem;

        set $bucket_name '';
        set $origin '';
        set_by_lua $bucket_name 'return os.getenv("S3_BUCKET_NAME")';
        set_by_lua $origin 'return os.getenv("ORIGIN")';

        location / {
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $origin always;
                add_header Access-Control-Allow-Methods 'GET, OPTIONS';
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Allow-Headers 'Authorization';
                return 204;
            }
            access_by_lua_block {
                local jwt = require "resty.jwt"
                local jwt_token = ngx.var.http_Authorization

                if not jwt_token then
                    ngx.status = ngx.HTTP_UNAUTHORIZED
                    ngx.say("Missing token")
                    return ngx.exit(ngx.HTTP_UNAUTHORIZED)
                end

                local auth_header_prefix = "Bearer "
                if not jwt_token:find(auth_header_prefix, 1, true) then
                    ngx.status = ngx.HTTP_UNAUTHORIZED
                    ngx.say("Invalid token")
                    return ngx.exit(ngx.HTTP_UNAUTHORIZED)
                end

                jwt_token = jwt_token:sub(auth_header_prefix:len() + 1)
                local jwt_obj = jwt:verify(os.getenv("JWT_SECRET_KEY"), jwt_token)

                if not jwt_obj.verified then
                    ngx.status = ngx.HTTP_UNAUTHORIZED
                    ngx.say("Invalid token")
                    return ngx.exit(ngx.HTTP_UNAUTHORIZED)
                end

                ngx.log(ngx.INFO, "User authenticated: " .. jwt_obj.payload.id)
            }

            set $upstream http://garage:3902;

            proxy_pass $upstream;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host "$bucket_name.garage:3902";
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Access-Control-Allow-Origin $origin always;
            add_header Access-Control-Allow-Credentials true always;
        }
    }
}
